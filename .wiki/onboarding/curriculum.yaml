        path: ".wiki/onboarding/steps/first-pr.md"
      - type: confluence
        query: "PR 작성 가이드"

  - id: code-review
    name: "코드 리뷰 문화"
    phase: 4
    day: "Week 2~3"
    skippable: false
    sources:
      - type: static
        path: ".wiki/onboarding/steps/code-review.md"
      - type: confluence
        query: "코드 리뷰 가이드라인"

  - id: testing-guide
    name: "테스트 작성 가이드"
    phase: 4
    day: "Week 3"
    skippable: false
    sources:
      - type: static
        path: ".wiki/onboarding/steps/testing-guide.md"
      - type: confluence
        query: "테스트 전략 가이드"
