        query: "@Test class extension:kt path:test"

  - id: first-ticket
    name: "첫 번째 티켓 처리"
    phase: 4
    day: "Week 3"
    skippable: false
    sources:
      - type: static
        path: ".wiki/onboarding/steps/first-ticket.md"

  # Phase 5: Week 3~4 — Productivity
