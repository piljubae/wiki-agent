lastUpdated: "2026-06-01"

phases:
  # Phase 1: Day 1~2 — Environment & First Build
  - id: env-setup
    name: "개발 환경 설정"
    phase: 1
    day: "Day 1"
    skippable: true
    levelFilter:
      skipWhen:
        android: "C"
    sources:
      - type: static
        path: ".wiki/onboarding/steps/env-setup.md"
      - type: confluence
        query: "Android 개발 환경 설정 가이드"

  - id: app-build
    name: "앱 빌드 및 실행"
    phase: 1
    day: "Day 1"
    skippable: true
    levelFilter:
      skipWhen:
        android: "C"
    sources:
      - type: static
        path: ".wiki/onboarding/steps/app-build.md"
      - type: confluence
        query: "앱 빌드 가이드"

  - id: project-structure
    name: "프로젝트 구조 파악"
    phase: 1
    day: "Day 2"
    skippable: false
    sources:
      - type: github-file
        path: "settings.gradle.kts"
      - type: github-file
        path: "app/build.gradle.kts"
      - type: github-file
        path: "build-logic/settings.gradle.kts"

  # Phase 2: Day 3~5 — Core Concepts
  - id: domain-terms
    name: "앱 도메인 용어 & 코드 약어"
    phase: 2
    day: "Day 3"
    skippable: false
    sources:
      - type: code
        query: "PDP PLP PLPSection panelCode deeplink"
      - type: code
        query: "sealed class Screen extension:kt"
      - type: code
        query: "enum class Section Type extension:kt path:features"
      - type: confluence
        query: "컬리 도메인 용어 사전"

  - id: architecture
    name: "아키텍처 개요"
    phase: 2
    day: "Day 3~4"
    skippable: true
    levelFilter:
      skipWhen:
        android: "C"
    sources:
      - type: static
        path: ".wiki/onboarding/steps/architecture.md"
      - type: confluence
        query: "Android 아키텍처 가이드"
      - type: code
        query: "ViewModel UseCase Repository"

  - id: kpds-design-system
    name: "KPDS 디자인 시스템"
    phase: 2
    day: "Day 4"
    skippable: false
    sources:
      - type: github-file
        path: "settings.gradle.kts"
        repo: "thefarmersfront/kpds-compose"
      - type: github-file
        path: "build.gradle.kts"
        repo: "thefarmersfront/kpds-compose"
      - type: confluence
        query: "KPDS 디자인 시스템 가이드"

  - id: common-modules
    name: "공통 모듈 사용법"
    phase: 2
    day: "Day 4"
    skippable: false
    sources:
      - type: static
        path: ".wiki/onboarding/steps/common-modules.md"
      - type: code
        query: "filename:build.gradle dependencies implementation project"

  - id: compose-convention
    name: "Compose 컨벤션"
    phase: 2
    day: "Day 5"
    skippable: true
    levelFilter:
      skipWhen:
        compose: "C"
    sources:
      - type: static
        path: ".wiki/onboarding/steps/compose-convention.md"
      - type: confluence
        query: "Compose 코딩 컨벤션"
      - type: code
        query: "@Composable Preview extension:kt"

  # Phase 3: Week 2 — Process & Tooling
  - id: branch-convention
    name: "브랜치 컨벤션"
    phase: 3
    day: "Week 2"
    skippable: false
    sources:
      - type: static
        path: ".wiki/onboarding/steps/branch-convention.md"
      - type: confluence
        query: "Git 브랜치 전략"

  - id: qa-deploy
    name: "QA 및 배포 프로세스"
    phase: 3
    day: "Week 2"
    skippable: false
    sources:
      - type: static
        path: ".wiki/onboarding/steps/qa-deploy.md"
      - type: confluence
        query: "QA 배포 프로세스"

  - id: monitoring
    name: "모니터링 도구"
    phase: 3
    day: "Week 2"
    skippable: true
    levelFilter:
      skipWhen:
        android: "C"
    sources:
      - type: static
        path: ".wiki/onboarding/steps/monitoring.md"
      - type: confluence
        query: "모니터링 대시보드 가이드"

  # Phase 4: Week 2~3 — First Contribution
